<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>50 Poker</title>

<style>
body {
    font-family: Arial;
    background: #0d0d0d;
    color: #fff;
    text-align: center;
}

.box {
    margin-top: 20px;
}

#playerInputs {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 10px;
    max-width: 900px;
    margin: 20px auto;
}

@media (max-width: 600px) {
    #playerInputs {
        grid-template-columns: repeat(2, 1fr);
    }
}

.player {
    background: #1a1a1a;
    border-radius: 10px;
    padding: 10px;
}

input {
    margin-top: 5px;
}

input[type="number"] {
    width: 60px;
}

input[type="text"] {
    width: 100px;
}

.rank {
    margin-top: 5px;
    font-size: 13px;
}

.blind-btn {
    background: #333;
    color: #fff;
    margin: 2px;
    border: none;
    border-radius: 5px;
    padding: 4px 6px;
    font-size: 12px;
}

.blind-btn.active {
    background: #00c853;
    color: #000;
}

button {
    margin-top: 10px;
    padding: 6px 12px;
    border-radius: 6px;
    border: none;
    cursor: pointer;
}

.result {
    margin-top: 20px;
}
</style>
</head>

<body>

<div class="box">
    <h2>🎲 คำนวนเงิน 270</h2>

    จำนวนผู้เล่น:
    <input type="number" id="players" value="7" onchange="generatePlayers()">

    <div id="playerInputs"></div>

    <button onclick="calculate()">คำนวณ</button>
    <button onclick="saveData()">💾 Save</button>

    <div class="result" id="output"></div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
    import { getAnalytics } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-analytics.js";
    import { 
        getFirestore, 
        collection, 
        addDoc 
    } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";
    
    const firebaseConfig = {
      apiKey: "xxx",
      authDomain: "tc-poker.firebaseapp.com",
      projectId: "tc-poker",
      storageBucket: "tc-poker.firebasestorage.app",
      messagingSenderId: "374948045821",
      appId: "1:374948045821:web:c969ac7883bd665ef42f94",
      measurementId: "G-3ZFVVQ2KJG"
    };
    
    const app = initializeApp(firebaseConfig);
    const analytics = getAnalytics(app);
    const db = getFirestore(app);
    
    window.db = db;
    window.fbAddDoc = addDoc;
    window.fbCollection = collection;
</script>
    
<script>

// 🔥 เก็บ cache
let playerCache = {};

function setBlind(p, v) {
    document.getElementById("blind"+p).value = v;

    let btns = document.querySelectorAll(`#p${p} .blind-btn`);
    btns.forEach(b=>b.classList.remove("active"));
    btns[v].classList.add("active");
}

function generatePlayers() {

    let n = +document.getElementById("players").value;
    let box = document.getElementById("playerInputs");

    let oldData = {};

    document.querySelectorAll(".player").forEach((p, index) => {
        let i = index + 1;

        oldData[i] = {
            name: document.getElementById("name"+i)?.value || "",
            kill: document.getElementById("kill"+i)?.value || 0,
            blind: document.getElementById("blind"+i)?.value || 0,
            rank: document.querySelector(`input[name="rank${i}"]:checked`)?.value || "0",
            paid: document.getElementById("paid"+i)?.checked || false
        };
    });

    box.innerHTML = "";

    for (let i=1;i<=n;i++) {

        let data = oldData[i] || {};

        box.innerHTML += `
        <div class="player" id="p${i}">
            <b>P${i}</b><br>

            👤 <input type="text" id="name${i}" value="${data.name || ""}" placeholder="ชื่อผู้เล่น"><br>

            🔫 <input type="number" id="kill${i}" value="${data.kill || 0}"><br>

            <div class="rank">
                <label><input type="radio" name="rank${i}" value="0" ${data.rank=="0"?"checked":""}> -</label>
                <label><input type="radio" name="rank${i}" value="1" ${data.rank=="1"?"checked":""}> 🥇</label>
                <label><input type="radio" name="rank${i}" value="2" ${data.rank=="2"?"checked":""}> 🥈</label>
            </div>

            <div>
                <button class="blind-btn ${(data.blind ?? 0)==0?"active":""}" onclick="setBlind(${i},0)">0</button>
                <button class="blind-btn ${(data.blind ?? 0)==1?"active":""}" onclick="setBlind(${i},1)">1</button>
                <button class="blind-btn ${(data.blind ?? 0)==2?"active":""}" onclick="setBlind(${i},2)">2</button>
                <button class="blind-btn ${(data.blind ?? 0)==3?"active":""}" onclick="setBlind(${i},3)">3</button>
            </div>

            <input type="hidden" id="blind${i}" value="${data.blind || 0}">

            <div style="margin-top:5px;">
                <label>
                    <input type="checkbox" id="paid${i}" 
                        ${data.paid?"checked":""}
                        onchange="updatePaidStatus(${i})"
                    >
                    <span id="paidText${i}" style="color:${data.paid ? '#00e676' : '#ff5252'};">
                        ${data.paid ? 'จ่ายแล้ว' : 'ยังไม่จ่าย'}
                    </span>
                </label>
            </div>
        </div>
        `;
    }
}

function calculate() {
    let n = +document.getElementById("players").value;

    let p1 = 0, p2 = 0;
    let names = [];
    let kills = [];

    let prizePool = 0;
    let tableFee = 0;

    let bountyTotal = 0;
    let bountyPaid = 0;

    let dealerBase = 0;
    let dealerBuyin = 0;

    let chipTotal = 0;

    let unpaidTotal = 0; // 🔥 เพิ่ม

    const mainPlayers = ["ตัง","กัน","อ้วน","ตอง","เอิท","อีน","ต้า","อิ้ง"];

    for (let i=1;i<=n;i++) {

        let rawName = document.getElementById("name"+i).value;
        let name = rawName || ("P"+i);

        let k = +document.getElementById("kill"+i).value || 0;
        let b = +document.getElementById("blind"+i).value || 0;
        let r = document.querySelector(`input[name="rank${i}"]:checked`)?.value || "0";

        if (r == 1) p1 = i;
        if (r == 2) p2 = i;

        let nameLower = rawName.trim().toLowerCase();

        let isGuest = rawName 
            ? !mainPlayers.includes(nameLower)
            : true;

        names.push(name);
        kills.push(k);

        prizePool += 200 + (b * 200);
        tableFee += 200 + (b * 200);
        bountyTotal += 50 + (b * 50);

        dealerBase += 20;
        dealerBuyin += b * 20;
    }

    if (!p1 || !p2) {
        alert("ต้องมี ที่ 1 และ ที่ 2");
        return;
    }

    let first = Math.ceil(prizePool * 0.7);
    let second = prizePool - first;
    let head = 50;

    let html = `<h3>🏆 สรุปผล</h3>`;

    html += `
    <table style="margin:auto; min-width:700px;">
    <tr>
        <th>Player</th>
        <th>Rank</th>
        <th>Kill</th>
        <th>💰 Bounty</th>
        <th>Buy-in</th>
        <th>จ่าย</th>
        <th>คำนวน</th>
        <th>รายได้</th>
        <th>ยอดสุทธิ</th>
    </tr>
    `;

    for (let i = 1; i <= n; i++) {

        let rawName = document.getElementById("name"+i).value;
        let name = rawName || ("P"+i);

        let blindCount = +document.getElementById("blind" + i).value || 0;

        let nameLower = rawName.trim().toLowerCase();

        let isGuest = rawName 
            ? !mainPlayers.includes(nameLower)
            : true;

        let pay = 250 + (blindCount * 250);
        let dealerPerPerson = 20 + (blindCount * 20);

        let chipFee = isGuest ? (30 + blindCount * 30) : 0;

        chipTotal += chipFee;

        let totalPay = pay + dealerPerPerson + chipFee;

        let killMoney = kills[i-1] * 50;
        bountyPaid += killMoney;

        let earn = killMoney;
        let rankText = "-";

        if (i === p1) {
            earn += first + head;
            rankText = "🥇";
        } 
        else if (i === p2) {
            earn += second;
            rankText = "🥈";
        }

        let isPaid = document.getElementById("paid"+i)?.checked;

        let profit = isPaid 
            ? earn           // จ่ายแล้ว → ไม่ต้องหัก
            : (earn - totalPay); // ยังไม่จ่าย → หัก

        if (!isPaid) {
            unpaidTotal += totalPay;
        }

        html += `
        <tr style="background:${i%2==0 ? '#111' : '#1a1a1a'};">
            <td>${name}</td>
            <td>${rankText}</td>
            <td>${kills[i-1]}</td>
            <td>${killMoney}</td>
            <td>${blindCount}</td>
            <td>${totalPay}</td>
                
            <td style="padding: 10px;">
                <div style="font-size:12px; color:#aaa; text-align:left;">


                ${i === p1 ? `<span style="color:gold;">+ Rank1: ${first}</span><br>` : ""}
                ${i === p2 ? `<span style="color:cyan;">+ Rank2: ${second}</span><br>` : ""}
                ${kills[i-1] > 0 ? `<span style="color: #4FC244">+ Kill: ${killMoney}</span><br>` : ""}
                ${i === p1 ? `<span style="color: #4FC244">+ Head Me: ${head}</span><br>` : ""}

                                ${isPaid 
                    ? `<span style="color:#00e676;">✔ จ่ายแล้ว</span><br>` 
                    : `<span style="color:#ff5252;">✖ ยังไม่จ่าย</span><br>`
                }

                <span style="color: #D16969;">- Buy-in: ${pay}</span><br>
                <span style="color: #D16969;">- Dealer: ${dealerPerPerson}</span><br>
                ${chipFee > 0 ? `<span style="color: #D16969;">- Chip: ${chipFee}</span>` : ""}

                </div>
            </td>
            
            <td style="color:#03a9f4;">${earn}</td>
            <td style="color:${profit>=0 ? '#00e676' : '#ff5252'}">
                ${profit>=0?'+':''}${profit}
            </td>
        </tr>
        `;
    }

    html += `
    <div>
        💰 ค่าโต๊ะรวม: ${tableFee}<br>
        🎯 ค่าหัวรวม:  ${bountyPaid} / ${bountyTotal}<br>
        🔥 รวมทั้งหมด: ${tableFee + bountyTotal}<br><br>

        🎲 Dealer + ${dealerBase} | + Buy-in : ${dealerBuyin} = (รวม ${dealerBase + dealerBuyin})<br>
        🎲 Chip + ${chipTotal}<br><br>

        <!-- 💸 ยอดค้างจ่าย: ${unpaidTotal} -->
        <br><br><br><br>
    </div>
    </table>
    `;

    document.getElementById("output").innerHTML = html;
}

async function saveData() {

    let n = +document.getElementById("players").value;

    let p1 = 0, p2 = 0;
    let names = [];
    let kills = [];
    let prizePool = 0;

    const mainPlayers = ["ตัง","กัน","อ้วน","ตอง","เอิท","อีน","ต้า","อิ้ง"];

    for (let i=1;i<=n;i++) {

        let name = document.getElementById("name"+i).value || ("P"+i);
        let k = +document.getElementById("kill"+i).value || 0;
        let b = +document.getElementById("blind"+i).value || 0;
        let r = document.querySelector(`input[name="rank${i}"]:checked`)?.value || "0";

        if (r == 1) p1 = i;
        if (r == 2) p2 = i;

        names.push(name);
        kills.push(k);

        prizePool += 200 + (b * 200);
    }

    if (!p1 || !p2) {
        alert("ต้องมี ที่ 1 และ ที่ 2");
        return;
    }

    let first = Math.ceil(prizePool * 0.7);
    let second = prizePool - first;
    let head = 50;

    let session = {
        date: new Date().toISOString(),
        key: "tc",
        players: []
    };

    for (let i = 1; i <= n; i++) {

        let blindCount = +document.getElementById("blind" + i).value || 0;

        let nameLower = names[i-1].toLowerCase();
        let isGuest = !mainPlayers.includes(nameLower);

        let pay = 270 + (blindCount * 270);
        let chipFee = isGuest ? (30 + blindCount * 30) : 0;

        let totalPay = pay + chipFee;

        let killMoney = kills[i-1] * 50;
        let earn = killMoney;

        let rank = 0;

        if (i === p1) {
            earn += first + head;
            rank = 1;
        } 
        else if (i === p2) {
            earn += second;
            rank = 2;
        }

        let profit = earn - totalPay;

        session.players.push({
            name: names[i-1].toLowerCase(),
            displayName: names[i-1],
            rank,
            kill: kills[i-1],
            bounty: killMoney,
            blind: blindCount,
            pay: totalPay,
            chip: chipFee,
            isGuest,
            earn,
            profit,
            paid: document.getElementById("paid"+i)?.checked || false
        });
    }

    try {
        await window.fbAddDoc(
            window.fbCollection(window.db, "sessions"), 
            session
        );

        alert("✅ บันทึกขึ้น Firebase แล้ว!");
    } catch (err) {
        console.error(err);
        alert("❌ ERROR: " + err.message);
    }
}

function updatePaidStatus(i) {
    let isPaid = document.getElementById("paid"+i).checked;
    let text = document.getElementById("paidText"+i);

    if (isPaid) {
        text.innerHTML = "จ่ายแล้ว";
        text.style.color = "#00e676";
    } else {
        text.innerHTML = "ยังไม่จ่าย";
        text.style.color = "#ff5252";
    }
}

generatePlayers();

</script>

</body>
</html>
